name: Security Guardrails

on:
  pull_request:
    paths:
      - "scripts/**"
      - "shell/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "shell/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell-secret-leak-check:
    name: Shell Secret Leak Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep

      - name: Check shell scripts for secret leakage patterns
        run: bash scripts/security/check-shell-secrets.sh
