name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  review:
    name: review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip dependabot PRs (lockfile bumps don't benefit from Claude review and
    # they'd burn through the Max-plan Agent SDK credit pool) and drafts.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the current pull request. Focus on:
            - Bugs, logic errors, and edge cases the diff introduces
            - Adherence to the conventions in CLAUDE.md at the repo root and in subdirectories
            - Anti-patterns called out in docs/capture/anti-patterns.md
            - Silent failures, swallowed exceptions, and "fix the trigger, not the class" patterns
            - Schema, migration, or invariant changes that aren't reflected across docs and code

            Skip stylistic nitpicks and issues a linter would catch. Prefer one
            high-signal comment over many low-signal ones. If the PR looks
            clean, post a short top-level confirmation instead of inline
            comments.

            Use `gh pr comment` for top-level feedback. Use
            `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for inline issues.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
