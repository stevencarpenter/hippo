[tools]
rust = "1.93"

[env]
HIPPO_DATA_DIR = "~/.local/share/hippo"
HIPPO_CONFIG_DIR = "~/.config/hippo"

# ── Build ────────────────────────────────────────────────────────────

[tasks.build]
description = "Build all Rust crates (debug)"
run = "cargo build"

[tasks."build:release"]
description = "Build all Rust crates (release)"
run = "cargo build --release"

[tasks."build:brain"]
description = "Sync Python brain dependencies"
run = "uv sync --project brain"

[tasks."build:all"]
description = "Build everything"
depends = ["build", "build:brain"]

# ── Test ─────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests (Rust unit + integration + Python) with lint and format checks"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [[ "${1:-}" == "--clean" ]]; then
    echo "==> Cleaning build artifacts..."
    cargo clean
    rm -rf brain/.pytest_cache brain/.ruff_cache
    echo ""
fi

echo "==> Rust unit tests (hippo-core)"
cargo test -p hippo-core
echo ""

echo "==> Rust unit tests (hippo-daemon)"
cargo test -p hippo-daemon --lib
echo ""

echo "==> Rust integration tests (hippo-daemon)"
cargo test -p hippo-daemon --tests
echo ""

echo "==> Python tests (brain)"
uv run --project brain pytest brain/tests -v --cov=hippo_brain --cov-report=term-missing
echo ""

echo "==> Clippy"
cargo clippy --all-targets -- -D warnings
echo ""

echo "==> Format check (Rust)"
cargo fmt --check
echo ""

echo "==> Ruff check + format (Python)"
uv run --project brain ruff check brain/
uv run --project brain ruff format --check brain/src brain/tests
echo ""

echo "=== All checks passed ==="
"""

[tasks."test:rust"]
description = "Run all Rust tests (unit + integration)"
run = "cargo test -p hippo-core -p hippo-daemon"

[tasks."test:core"]
description = "Run hippo-core tests only"
run = "cargo test -p hippo-core"

[tasks."test:daemon"]
description = "Run hippo-daemon unit tests only"
run = "cargo test -p hippo-daemon --lib"

[tasks."test:integration"]
description = "Run hippo-daemon integration tests only"
run = "cargo test -p hippo-daemon --tests"

[tasks."test:python"]
description = "Run Python brain tests with coverage"
run = "uv run --project brain pytest brain/tests -v --cov=hippo_brain --cov-report=term-missing"

# ── Lint ─────────────────────────────────────────────────────────────

[tasks.lint]
description = "Run all linters (check only)"
depends = ["lint:rust", "lint:python"]

[tasks."lint:rust"]
description = "Run clippy on all Rust targets"
run = "cargo clippy --all-targets -- -D warnings"

[tasks."lint:python"]
description = "Run ruff check on Python brain"
run = "uv run --project brain ruff check brain/"

# ── Fix (auto-correct lint + format) ────────────────────────────────

[tasks.fix]
description = "Auto-fix all lint and format issues"
depends = ["fix:rust", "fix:python", "fmt:sql"]

[tasks."fix:rust"]
description = "Auto-fix Rust clippy warnings and format"
run = [
  "cargo clippy --all-targets --fix --allow-dirty --allow-staged -- -D warnings",
  "cargo fmt",
]

[tasks."fix:python"]
description = "Auto-fix Python lint warnings and format"
run = [
  "uv run --project brain ruff check --fix brain/",
  "uv run --project brain ruff format brain/",
]

# ── Format ───────────────────────────────────────────────────────────

[tasks.fmt]
description = "Format all code (no lint fixes)"
depends = ["fmt:rust", "fmt:python"]

[tasks."fmt:rust"]
description = "Format Rust code"
run = "cargo fmt"

[tasks."fmt:python"]
description = "Format Python code"
run = "uv run --project brain ruff format brain/"

[tasks."fmt:sql"]
description = "Format SQL files with sqlfluff"
run = "uv run --project brain python tools/format_sql.py crates/hippo-core/src/schema.sql"

[tasks."fmt:check"]
description = "Check formatting without modifying files"
run = ["cargo fmt --check", "uv run --project brain ruff format --check brain/"]

# ── Check (CI-equivalent) ───────────────────────────────────────────

[tasks.check]
description = "Alias for 'mise run test' (full CI check)"
run = "mise run test"

# ── Run ──────────────────────────────────────────────────────────────

[tasks."run:daemon"]
description = "Run the daemon in the foreground"
run = "cargo run --bin hippo -- daemon run"

[tasks."run:brain"]
description = "Run the brain enrichment server"
run = "uv run --project brain hippo-brain serve"

[tasks.status]
description = "Show daemon status"
run = "cargo run --bin hippo -- status"

[tasks.doctor]
description = "Run diagnostic checks"
run = "cargo run --bin hippo -- doctor"

# ── Query / Explore ──────────────────────────────────────────────────

[tasks.sessions]
description = "List today's sessions"
run = "cargo run --bin hippo -- sessions --today"

[tasks.events]
description = "List recent events (last 2h)"
run = "cargo run --bin hippo -- events --since 2h"

[tasks.entities]
description = "List known entities"
run = "cargo run --bin hippo -- entities"

# ── Service management ───────────────────────────────────────────────

[tasks.install]
description = "Install the LaunchAgent for the daemon"
run = "cargo run --bin hippo -- daemon install"

[tasks.start]
description = "Start the daemon via launchd"
run = "cargo run --bin hippo -- daemon start"

[tasks.stop]
description = "Stop the daemon"
run = "cargo run --bin hippo -- daemon stop"

[tasks.restart]
description = "Restart the daemon"
run = "cargo run --bin hippo -- daemon restart"

[tasks.nuke]
description = "Kill all hippo processes immediately (SIGKILL), unload LaunchAgents, remove socket"
run = """
#!/usr/bin/env bash
set -uo pipefail

echo "Unloading LaunchAgents..."
launchctl bootout "gui/$(id -u)" ~/Library/LaunchAgents/com.hippo.daemon.plist 2>/dev/null && echo "  Unloaded com.hippo.daemon" || echo "  com.hippo.daemon not loaded"
launchctl bootout "gui/$(id -u)" ~/Library/LaunchAgents/com.hippo.brain.plist 2>/dev/null && echo "  Unloaded com.hippo.brain" || echo "  com.hippo.brain not loaded"

echo "Attempting graceful brain shutdown..."
cargo run --bin hippo -- brain stop 2>/dev/null || true

echo "Killing all hippo processes (SIGKILL)..."
pkill -9 -f 'hippo.*(daemon|send-event)' 2>/dev/null && echo "  Killed daemon processes" || echo "  No daemon processes found"
pkill -9 -f 'hippo-brain' 2>/dev/null && echo "  Killed brain processes" || echo "  No brain processes found"

echo "Cleaning up socket..."
rm -f ~/.local/share/hippo/daemon.sock /tmp/hippo-daemon.sock

echo "Done. Data and logs preserved in ~/.local/share/hippo/"
"""

# ── Export / Training ────────────────────────────────────────────────

[tasks."export:training"]
description = "Export training data as JSONL (last 30d)"
run = "cargo run --bin hippo -- export-training --since 30d --out ."

# ── Redaction ────────────────────────────────────────────────────────

[tasks."redact:test"]
description = "Test a string against redaction patterns"
run = "cargo run --bin hippo -- redact test \"$1\""

# ── Clean ────────────────────────────────────────────────────────────

[tasks.clean]
description = "Remove build artifacts"
run = [
  "cargo clean",
  "rm -rf brain/.venv brain/.pytest_cache brain/.ruff_cache brain/.venv",
]
