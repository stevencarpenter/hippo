# ── Service management ───────────────────────────────────────────────

[tasks."install:verify-brain-imports"]
description = "Verify deployed brain venv can import its critical dependencies"
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Catches the half-installed-namespace failure mode where `uv sync` reports
# success but the package contents weren't fully extracted. Observed on
# macOS arm64 with cached wheels: dist-info present, namespace empty, every
# dependent dashboard goes dark with no error message anywhere.
#
# The fix is `uv sync --reinstall`, which we'll run automatically once
# before bailing — install should self-heal on the common case rather than
# leave the user to debug it.

BRAIN_INSTALL_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/hippo-brain"
# Importing `create_app` is a strict superset of probing individual third-party
# packages: it transitively pulls in the entire startup graph the brain uses
# (starlette, uvicorn, httpx, sqlite_vec, opentelemetry, psutil, plus the
# hippo_brain.* internal modules). If any of them is half-installed, this
# probe trips at install time instead of on the first launchd start.
PROBE='
import sys
try:
    from hippo_brain.server import create_app  # noqa: F401
    sys.exit(0)
except Exception as exc:
    # Print to stdout: any CI capture that records only stdout still gets
    # the diagnostic, and the non-zero exit already signals failure.
    print(f"brain import probe failed: {exc!r}")
    sys.exit(1)
'

if (cd "$BRAIN_INSTALL_DIR" && uv run --no-sync python -c "$PROBE"); then
    echo "  Brain imports OK"
    exit 0
fi

echo "==> Brain imports failed; running uv sync --reinstall to repair..."
(cd "$BRAIN_INSTALL_DIR" && uv sync --reinstall)

if (cd "$BRAIN_INSTALL_DIR" && uv run --no-sync python -c "$PROBE"); then
    echo "  Brain imports OK after reinstall"
    exit 0
fi

echo "ERROR: brain venv at $BRAIN_INSTALL_DIR is unusable even after --reinstall."
echo "Manual recovery: rm -rf '$BRAIN_INSTALL_DIR/.venv' && cd '$BRAIN_INSTALL_DIR' && uv sync"
exit 1
'''

[tasks."install:omlx"]
description = "Install and start the optional oMLX LaunchAgent used by Hippo's local inference backend"
run = '''
#!/usr/bin/env bash
set -euo pipefail

DOMAIN="gui/$(id -u)"
DEST="$HOME/Library/LaunchAgents/com.hippo.omlx.plist"
DATA_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/hippo"
OMLX_BIN="/opt/homebrew/opt/omlx/bin/omlx"

if [ ! -x "$OMLX_BIN" ]; then
    echo "ERROR: oMLX is not installed at $OMLX_BIN"
    echo "Install it with: brew install jundot/omlx/omlx"
    exit 1
fi

mkdir -p "$DATA_DIR"

# Render and write the plist through hippo's render_plist path (same code path
# the unit test exercises). PATH is pinned to a launchd-safe set so the rendered
# plist environment matches the rest of Hippo's LaunchAgents, independent of the
# operator's shell at install time.
PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" \
    hippo daemon install-omlx --force

plutil -lint "$DEST" >/dev/null

# Retire competing managers before loading Hippo's oMLX agent. The Homebrew
# service is a user LaunchAgent too, but it is invisible to Hippo's service
# lifecycle and can drift to a different port than ~/.config/hippo/config.toml.
brew services stop jundot/omlx/omlx >/dev/null 2>&1 || brew services stop omlx >/dev/null 2>&1 || true
launchctl bootout "$DOMAIN" "$DEST" >/dev/null 2>&1 || true
pkill -f '/opt/homebrew/.*/omlx serve' >/dev/null 2>&1 || true

launchctl bootstrap "$DOMAIN" "$DEST"

for _ in {1..60}; do
    if curl -fsS --max-time 2 http://127.0.0.1:8000/v1/models >/dev/null 2>&1; then
        echo "Started com.hippo.omlx on http://127.0.0.1:8000/v1"
        exit 0
    fi
    sleep 1
done

echo "ERROR: com.hippo.omlx started but http://127.0.0.1:8000/v1/models did not respond within 60s"
echo "Inspect with: launchctl print $DOMAIN/com.hippo.omlx"
echo "Logs: $DATA_DIR/omlx.stderr.log"
exit 1
'''

[tasks.install]
description = "Full clean-install: stop, build, install, configure, start, verify"
run = '''
#!/usr/bin/env bash
set -euo pipefail

DOMAIN="gui/$(id -u)"
DAEMON_PLIST=~/Library/LaunchAgents/com.hippo.daemon.plist
BRAIN_PLIST=~/Library/LaunchAgents/com.hippo.brain.plist
DATA_DIR=~/.local/share/hippo
CONFIG_DIR=~/.config/hippo

wait_for_exit() {
    local pattern="$1" max_wait="${2:-10}"
    local waited=0
    while pgrep -f "$pattern" >/dev/null 2>&1; do
        if [ "$waited" -ge "$max_wait" ]; then
            echo "  WARN: $pattern still alive after ${max_wait}s, sending SIGKILL"
            pkill -9 -f "$pattern" 2>/dev/null || true
            sleep 1
            return
        fi
        sleep 1
        waited=$((waited + 1))
    done
}

# ── 1. Stop everything and wait for exit ────────────────────────────
echo "==> Stopping services..."
launchctl bootout "$DOMAIN" "$DAEMON_PLIST" 2>/dev/null && echo "  Unloaded daemon" || true
launchctl bootout "$DOMAIN" "$BRAIN_PLIST" 2>/dev/null && echo "  Unloaded brain" || true

# Kill ALL hippo processes — daemon, brain, session tailers, MCP servers.
# After a clean install, nothing should be running from a previous build.
DAEMON_PATTERN='hippo.*(daemon|send-event)'
TAILER_PATTERN='hippo ingest claude-session'
BRAIN_PATTERN='hippo-brain'
MCP_PATTERN='hippo-mcp'
pkill -f "$DAEMON_PATTERN" 2>/dev/null || true
pkill -f "$TAILER_PATTERN" 2>/dev/null || true
pkill -f "$BRAIN_PATTERN" 2>/dev/null || true
pkill -f "$MCP_PATTERN" 2>/dev/null || true
echo "  Waiting for processes to exit..."
wait_for_exit "$DAEMON_PATTERN"
wait_for_exit "$TAILER_PATTERN" 5
wait_for_exit "$BRAIN_PATTERN"
wait_for_exit "$MCP_PATTERN" 5
echo "  All processes stopped"

# ── 2. Clean artifacts ──────────────────────────────────────────────
if [[ "${1:-}" == "--clean" ]]; then
    echo "==> Purging ALL build and install artifacts (preserving data)..."
    # Rust build
    cargo clean 2>/dev/null && echo "  Cleaned cargo target/" || true
    # Python
    rm -rf brain/.venv brain/.pytest_cache brain/.ruff_cache
    echo "  Cleaned brain venv + caches"
    # Firefox extension
    rm -rf extension/firefox/dist extension/firefox/node_modules extension/firefox/web-ext-artifacts
    echo "  Cleaned firefox extension build artifacts"
    # Installed files
    rm -f ~/.local/bin/hippo
    rm -f "$DAEMON_PLIST" "$BRAIN_PLIST"
    NM_DIR="$HOME/Library/Application Support/Mozilla/NativeMessagingHosts"
    rm -f "$NM_DIR/hippo_daemon.json" "$NM_DIR/hippo-native-messaging"
    echo "  Removed installed plists, symlink, native messaging manifest"
    # Runtime artifacts (not data)
    rm -f "$DATA_DIR/daemon.sock" /tmp/hippo-daemon.sock
    rm -f "$DATA_DIR"/*.log
    echo "  Cleaned runtime artifacts (socket, logs)"
    echo "  Preserved: hippo.db, vectors/, fallback/, config/"
else
    echo "==> Cleaning stale artifacts..."
    rm -f "$DATA_DIR/daemon.sock" /tmp/hippo-daemon.sock
    rm -f "$DAEMON_PLIST" "$BRAIN_PLIST"
    rm -f ~/.local/bin/hippo
    rm -f "$DATA_DIR"/*.log
fi

# ── 3. Build release binary ─────────────────────────────────────────
echo "==> Building release binary..."
cargo build --release --features otel

# ── 3b. Stamp brain version ───────────────────────────────────────
echo "==> Stamping brain version..."
mise run stamp:version

# ── 4. Rebuild brain venv from scratch ──────────────────────────────
echo "==> Rebuilding brain venv..."
rm -rf brain/.venv
uv sync --project brain
echo "  venv ready at brain/.venv"

# ── 4b. Sync brain tree to XDG install location ─────────────────────
# The brain LaunchAgent runs `uv run --project ~/.local/share/hippo-brain`,
# not from the repo. Without this sync, a rebuilt daemon running against
# the installed brain sees a schema-version mismatch after any migration.
# Keep --delete so removed files don't linger, but exclude dev caches.
BRAIN_INSTALL_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/hippo-brain"
echo "==> Syncing brain to ${BRAIN_INSTALL_DIR}..."
mkdir -p "$BRAIN_INSTALL_DIR"
rsync -a --delete \
    --exclude='.venv' \
    --exclude='__pycache__' \
    --exclude='.ruff_cache' \
    --exclude='.pytest_cache' \
    brain/ "$BRAIN_INSTALL_DIR/"
# Mirror the release tarball layout: shell/ and scripts/ live alongside
# brain/ in the repo but must land under $BRAIN_INSTALL_DIR/ so doctor,
# hooks, and Xcode ingest LaunchAgents find them.
rsync -a --delete shell/ "$BRAIN_INSTALL_DIR/shell/"
rsync -a --delete scripts/ "$BRAIN_INSTALL_DIR/scripts/"
echo "==> Rebuilding brain venv at ${BRAIN_INSTALL_DIR}..."
# `uv sync` against a stale .venv has, in the wild, left dist-info present
# while leaving the namespace package half-extracted (observed 2026-04-26 on
# macOS arm64: opentelemetry/{exporter,instrumentation,proto,sdk} present but
# opentelemetry/{api,metrics,trace} missing). A subsequent `--reinstall`
# repaired it. Rather than risk that race in production, nuke the venv first
# so uv builds it from scratch — and verify imports below.
rm -rf "$BRAIN_INSTALL_DIR/.venv"
(cd "$BRAIN_INSTALL_DIR" && uv sync)
mise run install:verify-brain-imports

# ── 5. Install plists + symlink ─────────────────────────────────────
echo "==> Installing LaunchAgents + symlink..."
cargo run --release --features otel --bin hippo -- daemon install --force

# ── 6. Bootstrap config files (preserve existing) ───────────────────
echo "==> Ensuring config files..."
mkdir -p "$CONFIG_DIR"
if [ ! -f "$CONFIG_DIR/config.toml" ]; then
    cp config/config.default.toml "$CONFIG_DIR/config.toml"
    echo "  Created $CONFIG_DIR/config.toml"
else
    echo "  $CONFIG_DIR/config.toml exists (preserved)"
fi
if [ ! -f "$CONFIG_DIR/redact.toml" ]; then
    cp config/redact.default.toml "$CONFIG_DIR/redact.toml"
    echo "  Created $CONFIG_DIR/redact.toml"
else
    echo "  $CONFIG_DIR/redact.toml exists (preserved)"
fi

# ── 7. Ensure data dir ──────────────────────────────────────────────
mkdir -p "$DATA_DIR"

# ── 7b. Refresh OTel stack when enabled or already provisioned ──────
OTEL_ENABLED=$(python3 - <<'PY'
from pathlib import Path
import os
import tomllib

config_path = Path(os.path.expanduser("~/.config/hippo/config.toml"))
if not config_path.exists():
    print("0")
else:
    config = tomllib.loads(config_path.read_text())
    print("1" if config.get("telemetry", {}).get("enabled", False) else "0")
PY
)
OTEL_STACK_PRESENT=0
if command -v docker >/dev/null 2>&1; then
    if docker ps -a 2>/dev/null | awk 'NR > 1 { print $NF }' | grep -q '^hippo-otel-'; then
        OTEL_STACK_PRESENT=1
    fi
fi
if [ "$OTEL_ENABLED" = "1" ] || [ "$OTEL_STACK_PRESENT" = "1" ]; then
    if command -v docker >/dev/null 2>&1; then
        echo "==> Refreshing OTel stack..."
        mise run otel:up || echo "  WARN: OTel stack refresh failed (non-fatal)"
    else
        echo "  WARN: Docker not found; skipped OTel stack refresh"
    fi
fi

# ── 8. Start services ───────────────────────────────────────────────
echo "==> Starting services..."
mise run start

# ── 8b. Build Firefox extension dist/ ───────────────────────────────────
# manifest.json references dist/background.js and dist/content.js. These
# are required for the extension to work when loaded via about:debugging
# (the documented setup). install:ext below also builds dist/ as part of
# .xpi packaging, but it may short-circuit if Firefox Developer Edition
# isn't installed. Run the dist build unconditionally as a best-effort
# step; if it fails, install can continue but the Firefox extension may
# remain non-functional.
echo "==> Building Firefox extension dist/..."
mise run build:ext:dist || echo "  WARN: extension dist/ build failed — Firefox extension will be a no-op"

# ── 8c. Install Firefox extension (side-load into Developer Edition) ────
echo "==> Installing Firefox extension..."
mise run install:ext || echo "  WARN: extension install failed (non-fatal)"

# ── 8d. Install Claude Code skill ───────────────────────────────────────
echo "==> Installing Claude Code skill..."
mise run install:skill || echo "  WARN: skill install failed (non-fatal)"

# ── 9. Verify ────────────────────────────────────────────────────────
echo "==> Verifying..."
sleep 1
~/.local/bin/hippo doctor || true

# Wait for brain to confirm inference-server connectivity. The brain emits
# both "inference_reachable" (preferred) and "lmstudio_reachable" (legacy
# alias kept for older consumers); we read either.
echo "  Checking brain health..."
for i in $(seq 1 10); do
    if health=$(curl -sf http://localhost:9175/health 2>/dev/null); then
        reachable=$(echo "$health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('inference_reachable', d.get('lmstudio_reachable','')))" 2>/dev/null)
        if [ "$reachable" = "True" ]; then
            echo "  Brain healthy, inference server reachable"
            break
        fi
    fi
    if [ "$i" -eq 10 ]; then
        echo "  WARN: Brain did not confirm inference connectivity within 10s"
        echo "  Check: curl http://localhost:9175/health"
        break
    fi
    sleep 1
done

echo ""
echo "=== Install complete ==="

# Check if shell needs reloading for PATH
if ! command -v hippo &>/dev/null; then
    echo ""
    echo "hippo is not on your PATH yet. Run:"
    echo "  exec zsh"
fi

# ── 10. Check OTel stack availability ───────────────────────────────
echo ""
OTEL_ENABLED=$(awk '
    BEGIN { in_telemetry = 0; enabled = "0" }
    /^[[:space:]]*\[telemetry\][[:space:]]*$/ { in_telemetry = 1; next }
    in_telemetry && /^[[:space:]]*\[/ { exit }
    in_telemetry && /^[[:space:]]*#/ { next }
    in_telemetry && /^[[:space:]]*enabled[[:space:]]*=[[:space:]]*true[[:space:]]*$/ { enabled = "1"; exit }
    in_telemetry && /^[[:space:]]*enabled[[:space:]]*=[[:space:]]*false[[:space:]]*$/ { enabled = "0"; exit }
    END { print enabled }
' "$CONFIG_DIR/config.toml" 2>/dev/null || echo "0")
OTEL_COLLECTOR_UP="0"
if curl -sf http://localhost:13133/ >/dev/null 2>&1; then
    OTEL_COLLECTOR_UP="1"
fi

if [ "$OTEL_ENABLED" = "0" ] && [ "$OTEL_COLLECTOR_UP" = "1" ]; then
    echo "NOTE: OpenTelemetry collector is running but telemetry is disabled in config."
    echo "      To enable observability:"
    echo "        1. Edit ~/.config/hippo/config.toml and set [telemetry] enabled = true"
    echo "        2. Run: mise run restart"
    echo "        3. Access Grafana: http://localhost:3030 (admin/hippo)"
elif [ "$OTEL_ENABLED" = "0" ] && [ "$OTEL_COLLECTOR_UP" = "0" ]; then
    echo "NOTE: OpenTelemetry observability is disabled."
    echo "      To enable it:"
    echo "        1. Run: mise run otel:up"
    echo "        2. Edit ~/.config/hippo/config.toml and set [telemetry] enabled = true"
    echo "        3. Run: mise run restart"
fi
'''

[tasks.start]
description = "Start hippo services via launchd"
run = """
#!/usr/bin/env bash
set -euo pipefail
DOMAIN="gui/$(id -u)"
for label in \
  com.hippo.omlx \
  com.hippo.daemon \
  com.hippo.brain \
  com.hippo.watchdog \
  com.hippo.probe \
  com.hippo.claude-session-watcher \
  com.hippo.gh-poll \
  com.hippo.opencode-poll \
  com.hippo.xcode-claude-ingest \
  com.hippo.codex-session \
  com.hippo.cursor-session \
  com.hippo.auto-memory
do
  plist="$HOME/Library/LaunchAgents/${label}.plist"
  name="${label#com.hippo.}"
  if [ ! -f "$plist" ]; then
    echo "Skipped $name (plist not installed)"
    continue
  fi
  launchctl bootstrap "$DOMAIN" "$plist" 2>/dev/null && echo "Started $name" || echo "$name already loaded (or failed)"
done
"""

[tasks.stop]
description = "Stop hippo services via launchd"
run = """
#!/usr/bin/env bash
set -euo pipefail
DOMAIN="gui/$(id -u)"
for label in \
  com.hippo.omlx \
  com.hippo.daemon \
  com.hippo.brain \
  com.hippo.watchdog \
  com.hippo.probe \
  com.hippo.claude-session-watcher \
  com.hippo.gh-poll \
  com.hippo.opencode-poll \
  com.hippo.xcode-claude-ingest \
  com.hippo.codex-session \
  com.hippo.cursor-session \
  com.hippo.auto-memory
do
  plist="$HOME/Library/LaunchAgents/${label}.plist"
  name="${label#com.hippo.}"
  if [ ! -f "$plist" ]; then
    echo "Skipped $name (plist not installed)"
    continue
  fi
  launchctl bootout "$DOMAIN" "$plist" 2>/dev/null && echo "Stopped $name" || echo "$name not loaded"
done
"""

[tasks.restart]
