echo "==> Running Claude enrichment (1:1, this will take a while)..."
uv run --project brain python scripts/hippo-ingest-claude.py --enrich ${1:-}
echo ""

echo "==> Deleting vector store..."
rm -rf "$DATA_DIR/vectors"

