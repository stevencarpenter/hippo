[tasks.vectors]
description = "Show vector store contents and stats"
run = """
uv run --project brain python -c "
from hippo_brain.embeddings import open_vector_db, get_or_create_table, EMBED_DIM
table = get_or_create_table(open_vector_db('$HOME/.local/share/hippo'))
t = table.to_arrow()
print(f'Vector store: {t.num_rows} rows, {EMBED_DIM}d embeddings')
print()
for i in range(t.num_rows):
    sid = t.column('session_id')[i].as_py()
    s = str(t.column('summary')[i])[:100]
    o = t.column('outcome')[i]
    tags = t.column('tags')[i]
    print(f'  [{o}] {s}')
    print(f'         tags={tags}')
"
"""

[tasks."vectors:search"]
description = "Semantic search over the vector store"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [ -z "${1:-}" ]; then echo "Usage: mise run vectors:search <query>"; exit 1; fi
uv run --project brain python -c "
import asyncio, sys
from hippo_brain.embeddings import open_vector_db, get_or_create_table, search_similar
from hippo_brain.client import LMStudioClient
async def main():
    client = LMStudioClient()
    vecs = await client.embed([sys.argv[1]], model='$(grep "^embedding" ~/.config/hippo/config.toml | cut -d'"' -f2)')
    table = get_or_create_table(open_vector_db('$HOME/.local/share/hippo'))
    results = search_similar(table, vecs[0], limit=5)
    for r in results:
        d = r.get('_distance', 0)
        s = str(r.get('summary', ''))[:120]
        print(f'  [{d:.3f}] {s}')
asyncio.run(main())
" "$1"
"""

[tasks.re-enrich]
description = "Nuke and re-enrich all events using the bulk model"
run = """
#!/usr/bin/env bash
set -euo pipefail

DATA_DIR=~/.local/share/hippo
DB="$DATA_DIR/hippo.db"

echo "==> Stopping brain..."
pkill -f 'hippo-brain' 2>/dev/null && sleep 1 || true

echo "==> Deleting vector store..."
rm -rf "$DATA_DIR/vectors"
echo "  Removed $DATA_DIR/vectors/"

echo "==> Resetting knowledge nodes and enrichment queue..."
sqlite3 "$DB" 'DELETE FROM knowledge_node_events'
sqlite3 "$DB" 'DELETE FROM knowledge_node_entities'
sqlite3 "$DB" 'DELETE FROM knowledge_nodes'
sqlite3 "$DB" "UPDATE enrichment_queue SET status = 'pending', retry_count = 0, error_message = NULL, locked_at = NULL, locked_by = NULL WHERE status IN ('done', 'failed', 'processing')"

PENDING=$(sqlite3 "$DB" "SELECT COUNT(*) FROM enrichment_queue WHERE status = 'pending'")
echo "  Re-enrichment queued: $PENDING events pending"
echo ""

echo "==> Running bulk enrichment..."
uv run --project brain python scripts/hippo-bulk-enrich.py ${1:-}

echo ""
echo "==> Restart brain for daily operation:"
echo "  mise run start"
"""

[tasks."re-enrich:failed"]
description = "Redrive failed enrichment queue items (shell, Claude, browser, workflow) back to pending"
run = """
#!/usr/bin/env bash
set -euo pipefail

DB=~/.local/share/hippo/hippo.db

for TABLE in enrichment_queue claude_enrichment_queue browser_enrichment_queue workflow_enrichment_queue; do
    BEFORE=$(sqlite3 "$DB" "SELECT COUNT(*) FROM $TABLE WHERE status = 'failed'")
    sqlite3 "$DB" "UPDATE $TABLE SET status = 'pending', retry_count = 0, error_message = NULL, locked_at = NULL, locked_by = NULL WHERE status = 'failed'"
    echo "  $TABLE: requeued $BEFORE failed item(s)"
done
"""

