[tools]
rust = "1.95"

[env]
# Paths are resolved via XDG defaults in the Rust config module.
# Set XDG_DATA_HOME or XDG_CONFIG_HOME to override.

# ── Build ────────────────────────────────────────────────────────────

[tasks.build]
description = "Build all Rust crates and HippoGUI"
depends = ["gui:build"]
run = "cargo build"

[tasks."build:release"]
description = "Build all Rust crates (release)"
run = "cargo build --release"

[tasks."build:brain"]
description = "Sync Python brain dependencies"
depends = ["stamp:version"]
run = "uv sync --project brain"

[tasks."build:all"]
description = "Build everything"
depends = ["build", "build:brain"]

[tasks."build:ext:dist"]
description = "Build the Firefox extension dist/ bundle (TypeScript -> dist/*.js)"
run = """
#!/usr/bin/env bash
set -euo pipefail

cd extension/firefox

if ! command -v npm >/dev/null 2>&1; then
    echo "ERROR: npm not found; cannot build extension dist/" >&2
    echo "       manifest.json references dist/background.js and dist/content.js." >&2
    echo "       Install Node.js (e.g., 'brew install node') then rerun 'mise run build:ext:dist'." >&2
    echo "       Without dist/, the Firefox extension is a no-op when loaded via about:debugging." >&2
    exit 1
fi

if [ ! -d node_modules ]; then
    echo "==> Installing extension dependencies..."
    if [ -f package-lock.json ]; then
        npm ci --silent
    else
        npm install --silent
    fi
fi

echo "==> Building extension dist/..."
npm run build --silent

# Sanity check: manifest.json references these files directly. If they're
# missing, the extension is silently a no-op when loaded as a temporary add-on.
for f in dist/background.js dist/content.js; do
    if [ ! -f "$f" ]; then
        echo "ERROR: expected $f was not produced by the build"
        exit 1
    fi
done
echo "  Built: extension/firefox/dist/"
"""

[tasks."build:ext"]
description = "Build and package the Firefox extension as an .xpi"
run = """
#!/usr/bin/env bash
set -euo pipefail

# Preserve the historical no-op behavior when Node/npm is unavailable.
# Only build dist/ and package the .xpi when npm exists.
if ! command -v npm >/dev/null 2>&1; then
    echo "npm not found; skipping .xpi packaging"
    exit 0
fi

echo "==> Building extension dist/..."
mise run build:ext:dist

cd extension/firefox

echo "==> Packaging extension..."
npm run package --silent

# web-ext emits a .zip; Firefox loads it just fine as an .xpi.
ARTIFACT=$(ls -t web-ext-artifacts/*.zip 2>/dev/null | head -1)
if [ -z "$ARTIFACT" ]; then
    echo "ERROR: web-ext did not produce an artifact"
    exit 1
fi
echo "  Built: $ARTIFACT"
"""

[tasks."install:ext"]
description = "Side-load the Firefox extension into Firefox Developer Edition"
depends = ["build:ext"]
run = """
#!/usr/bin/env bash
set -euo pipefail

FIREFOX_ROOT="$HOME/Library/Application Support/Firefox"
PROFILES_INI="$FIREFOX_ROOT/profiles.ini"
if [ ! -f "$PROFILES_INI" ]; then
    echo "Firefox profiles.ini not found; skipping extension install"
    exit 0
fi

# Resolve the Firefox Developer Edition profile directory. Strategy:
#   1. Parse profiles.ini with Python's configparser (handles IsRelative=0/1
#      and all the edge cases awk would miss).
#   2. Prefer the profile with Name=dev-edition-default.
#   3. Fall back to any profile whose path contains "dev-edition".
#   4. Bail if none found.
PROFILE_DIR=$(FIREFOX_ROOT="$FIREFOX_ROOT" PROFILES_INI="$PROFILES_INI" python3 - <<'PY'
import configparser, os, sys
cp = configparser.ConfigParser()
try:
    cp.read(os.environ["PROFILES_INI"])
except Exception as e:
    print(f"ERROR parsing profiles.ini: {e}", file=sys.stderr)
    sys.exit(0)

root = os.environ["FIREFOX_ROOT"]
def resolve(section):
    path = cp[section].get("Path", "")
    if not path: return ""
    is_rel = cp[section].get("IsRelative", "1") == "1"
    return os.path.join(root, path) if is_rel else path

# Pass 1: exact name match.
for s in cp.sections():
    if not s.startswith("Profile"): continue
    if cp[s].get("Name", "") == "dev-edition-default":
        print(resolve(s)); sys.exit(0)

# Pass 2: any profile whose path looks like dev-edition.
for s in cp.sections():
    if not s.startswith("Profile"): continue
    if "dev-edition" in cp[s].get("Path", ""):
        print(resolve(s)); sys.exit(0)
PY
)

if [ -z "$PROFILE_DIR" ]; then
    echo "No Firefox Developer Edition profile found in profiles.ini; skipping extension install"
    exit 0
fi
if [ ! -d "$PROFILE_DIR" ]; then
    echo "Profile directory not found: $PROFILE_DIR; skipping extension install"
    exit 0
fi

# Extract the gecko extension ID from manifest.json. Handle missing file or
# malformed structure with a concise error rather than a Python stack trace.
MANIFEST="extension/firefox/manifest.json"
if [ ! -f "$MANIFEST" ]; then
    echo "ERROR: $MANIFEST not found"
    exit 1
fi
EXT_ID=$(python3 - "$MANIFEST" <<'PY' 2>/dev/null
import json, sys
try:
    with open(sys.argv[1]) as f:
        print(json.load(f)["browser_specific_settings"]["gecko"]["id"])
except (OSError, ValueError, KeyError):
    sys.exit(1)
PY
)
if [ -z "$EXT_ID" ]; then
    echo "ERROR: could not read browser_specific_settings.gecko.id from $MANIFEST"
    exit 1
fi

ARTIFACT=$(ls -t extension/firefox/web-ext-artifacts/*.zip 2>/dev/null | head -1)
if [ -z "$ARTIFACT" ]; then
    echo "No extension artifact found; run 'mise run build:ext' first"
    exit 1
fi

DEST="$PROFILE_DIR/extensions/${EXT_ID}.xpi"
mkdir -p "$PROFILE_DIR/extensions"
cp "$ARTIFACT" "$DEST"
echo "==> Installed extension: $DEST"

# Verify xpinstall.signatures.required is set to false. If it isn't,
# Firefox will silently delete the unsigned .xpi on startup.
PREFS="$PROFILE_DIR/prefs.js"
if [ -f "$PREFS" ]; then
    # Match: user_pref("xpinstall.signatures.required", false);
    if ! grep -Eq '^user_pref\\("xpinstall\\.signatures\\.required",[[:space:]]*false\\)' "$PREFS"; then
        echo ""
        echo "  WARN: xpinstall.signatures.required is not set to false in prefs.js."
        echo "        Firefox will reject this unsigned extension on startup."
        echo "        In about:config, set xpinstall.signatures.required = false, then restart Firefox."
    fi
fi

# Warn if Firefox is running — it won't re-scan the extensions dir until restart.
if pgrep -f "Firefox Developer Edition" >/dev/null 2>&1 || pgrep -f "Firefox.app/Contents/MacOS/firefox" >/dev/null 2>&1; then
    echo ""
    echo "  NOTE: Firefox is running. Restart it for the updated extension to load."
fi
"""

[tasks."stamp:version"]
description = "Stamp brain _version.py with git metadata (matches Rust build.rs)"
run = """
#!/usr/bin/env bash
set -euo pipefail

BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
RAW=$(git describe --tags --always --dirty --match 'v*' 2>/dev/null || echo "unknown")

if [ "$RAW" = "v${BASE_VERSION}" ]; then
    FULL_VERSION="$BASE_VERSION"
elif [ "$RAW" = "v${BASE_VERSION}-dirty" ]; then
    FULL_VERSION="${BASE_VERSION}+dirty"
elif [[ "$RAW" == v* ]]; then
    DIRTY=""
    CLEAN="$RAW"
    if [[ "$RAW" == *-dirty ]]; then
        DIRTY=".dirty"
        CLEAN="${RAW%-dirty}"
    fi
    # v0.1.0-3-g63ea88d -> count=3, sha=g63ea88d
    COUNT=$(echo "$CLEAN" | sed 's/v[^-]*-\\([0-9]*\\)-.*/\\1/')
    SHA=$(echo "$CLEAN" | sed 's/v[^-]*-[0-9]*-//')
    FULL_VERSION="${BASE_VERSION}-dev.${COUNT}+${SHA}${DIRTY}"
else
    DIRTY=""
    SHA="$RAW"
    if [[ "$RAW" == *-dirty ]]; then
        DIRTY=".dirty"
        SHA="${RAW%-dirty}"
    fi
    FULL_VERSION="${BASE_VERSION}-dev+g${SHA}${DIRTY}"
fi

mkdir -p brain/src/hippo_brain
echo "__version__ = \\"${FULL_VERSION}\\"" > brain/src/hippo_brain/_version.py
echo "Stamped brain version: ${FULL_VERSION}"
"""

# ── Test ─────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests (Rust unit + integration + Python + GUI)"
depends = ["gui:test", "gui:lint"]
run = """
#!/usr/bin/env bash
set -euo pipefail

if [[ "${1:-}" == "--clean" ]]; then
    echo "==> Cleaning build artifacts..."
    cargo clean
    rm -rf brain/.pytest_cache brain/.ruff_cache
    echo ""
fi

echo "==> Rust unit tests (hippo-core)"
cargo test -p hippo-core
echo ""

echo "==> Rust unit tests (hippo-daemon)"
cargo test -p hippo-daemon --lib
echo ""

echo "==> Rust integration tests (hippo-daemon)"
cargo test -p hippo-daemon --tests
echo ""

echo "==> Python tests (brain)"
uv run --project brain pytest brain/tests -v --cov=hippo_brain --cov-report=term-missing
echo ""

echo "==> Clippy"
cargo clippy --all-targets -- -D warnings
echo ""

echo "==> Format check (Rust)"
cargo fmt --check
echo ""

echo "==> Ruff check + format (Python)"
uv run --project brain ruff check brain/
uv run --project brain ruff format --check brain/src brain/tests
echo ""

echo "=== All checks passed ==="
"""

[tasks."test:rust"]
description = "Run all Rust tests (unit + integration)"
run = "cargo test -p hippo-core -p hippo-daemon"

[tasks."test:core"]
description = "Run hippo-core tests only"
run = "cargo test -p hippo-core"

[tasks."test:daemon"]
description = "Run hippo-daemon unit tests only"
run = "cargo test -p hippo-daemon --lib"

[tasks."test:integration"]
description = "Run hippo-daemon integration tests only"
run = "cargo test -p hippo-daemon --tests"

[tasks."test:python"]
description = "Run Python brain tests with coverage"
run = "uv run --project brain pytest brain/tests -v --cov=hippo_brain --cov-report=term-missing"

[tasks."gui:test"]
description = "Run HippoGUI unit tests"
run = "swift test --package-path hippo-gui"

# ── Lint ─────────────────────────────────────────────────────────────

[tasks.lint]
description = "Run all linters (check only)"
depends = ["lint:rust", "lint:python", "gui:lint"]

[tasks."lint:rust"]
description = "Run clippy on all Rust targets"
run = "cargo clippy --all-targets -- -D warnings"

[tasks."lint:python"]
description = "Run ruff check on Python brain"
run = "uv run --project brain ruff check brain/"

[tasks."gui:lint"]
description = "Lint Swift sources with SwiftLint"
run = "swiftlint lint --config hippo-gui/.swiftlint.yml hippo-gui/Sources"

# ── Fix (auto-correct lint + format) ────────────────────────────────

[tasks.fix]
description = "Auto-fix all lint and format issues"
depends = ["fix:rust", "fix:python", "gui:fix", "fmt:sql"]

[tasks."fix:rust"]
description = "Auto-fix Rust clippy warnings and format"
run = [
  "cargo clippy --all-targets --fix --allow-dirty --allow-staged -- -D warnings",
  "cargo fmt",
]

[tasks."fix:python"]
description = "Auto-fix Python lint warnings and format"
run = [
  "uv run --project brain ruff check --fix brain/",
  "uv run --project brain ruff format brain/",
]

[tasks."fix:swift"]
description = "Auto-fix SwiftLint warnings in HippoGUI"
run = "swiftlint lint --fix --config hippo-gui/.swiftlint.yml hippo-gui/Sources"

[tasks."gui:fix"]
description = "Auto-fix all HippoGUI lint and format issues (SwiftLint + swift-format)"
# swift-format runs first to normalize, SwiftLint runs second to enforce preferences
# (same-line braces). Sequential order matters — parallel execution causes races.
run = [
    "swift-format format --configuration hippo-gui/.swift-format -r -i hippo-gui/Sources",
    "swiftlint lint --fix --config hippo-gui/.swiftlint.yml hippo-gui/Sources",
]

# ── Format ───────────────────────────────────────────────────────────

[tasks.fmt]
description = "Format all code (no lint fixes)"
depends = ["fmt:rust", "fmt:python", "gui:format"]

[tasks."fmt:rust"]
description = "Format Rust code"
run = "cargo fmt"

[tasks."fmt:python"]
description = "Format Python code"
run = "uv run --project brain ruff format brain/"

[tasks."gui:format"]
description = "Format Swift sources with swift-format"
run = "swift-format format --configuration hippo-gui/.swift-format -r -i hippo-gui/Sources"

[tasks."fmt:sql"]
description = "Format SQL files with sqlfluff"
run = "uv run --project brain python tools/format_sql.py crates/hippo-core/src/schema.sql"

[tasks."fmt:check"]
description = "Check formatting without modifying files"
run = [
  "cargo fmt --check",
  "uv run --project brain ruff format --check brain/",
  "swift-format lint --configuration hippo-gui/.swift-format -r hippo-gui/Sources",
]

# ── Check (CI-equivalent) ───────────────────────────────────────────

[tasks.check]
description = "Alias for 'mise run test' (full CI check)"
run = "mise run test"

# ── Run ──────────────────────────────────────────────────────────────

[tasks."run:daemon"]
description = "Run the daemon in the foreground"
run = "cargo run --bin hippo -- daemon run"

[tasks."run:brain"]
description = "Run the brain enrichment server"
run = "uv run --project brain hippo-brain serve"

[tasks."gui:open"]
description = "Open HippoGUI app (built release)"
run = "open hippo-gui/build/Release/HippoGUI.app"

[tasks.status]
description = "Show daemon status"
run = "cargo run --bin hippo -- status"

[tasks.doctor]
description = "Run diagnostic checks"
run = "cargo run --bin hippo -- doctor"

# ── Query / Explore ──────────────────────────────────────────────────

[tasks.sessions]
description = "List today's sessions"
run = "cargo run --bin hippo -- sessions --today"

[tasks.events]
description = "List recent events (last 2h)"
run = "cargo run --bin hippo -- events --since 2h"

[tasks.entities]
description = "List known entities"
run = "cargo run --bin hippo -- entities"

# ── Service management ───────────────────────────────────────────────

[tasks.install]
description = "Full clean-install: stop, build, install, configure, start, verify"
run = '''
#!/usr/bin/env bash
set -euo pipefail

DOMAIN="gui/$(id -u)"
DAEMON_PLIST=~/Library/LaunchAgents/com.hippo.daemon.plist
BRAIN_PLIST=~/Library/LaunchAgents/com.hippo.brain.plist
DATA_DIR=~/.local/share/hippo
CONFIG_DIR=~/.config/hippo

wait_for_exit() {
    local pattern="$1" max_wait="${2:-10}"
    local waited=0
    while pgrep -f "$pattern" >/dev/null 2>&1; do
        if [ "$waited" -ge "$max_wait" ]; then
            echo "  WARN: $pattern still alive after ${max_wait}s, sending SIGKILL"
            pkill -9 -f "$pattern" 2>/dev/null || true
            sleep 1
            return
        fi
        sleep 1
        waited=$((waited + 1))
    done
}

# ── 1. Stop everything and wait for exit ────────────────────────────
echo "==> Stopping services..."
launchctl bootout "$DOMAIN" "$DAEMON_PLIST" 2>/dev/null && echo "  Unloaded daemon" || true
launchctl bootout "$DOMAIN" "$BRAIN_PLIST" 2>/dev/null && echo "  Unloaded brain" || true

# Kill ALL hippo processes — daemon, brain, session tailers, MCP servers.
# After a clean install, nothing should be running from a previous build.
DAEMON_PATTERN='hippo.*(daemon|send-event)'
TAILER_PATTERN='hippo ingest claude-session'
BRAIN_PATTERN='hippo-brain'
MCP_PATTERN='hippo-mcp'
pkill -f "$DAEMON_PATTERN" 2>/dev/null || true
pkill -f "$TAILER_PATTERN" 2>/dev/null || true
pkill -f "$BRAIN_PATTERN" 2>/dev/null || true
pkill -f "$MCP_PATTERN" 2>/dev/null || true
echo "  Waiting for processes to exit..."
wait_for_exit "$DAEMON_PATTERN"
wait_for_exit "$TAILER_PATTERN" 5
wait_for_exit "$BRAIN_PATTERN"
wait_for_exit "$MCP_PATTERN" 5
echo "  All processes stopped"

# ── 2. Clean artifacts ──────────────────────────────────────────────
if [[ "${1:-}" == "--clean" ]]; then
    echo "==> Purging ALL build and install artifacts (preserving data)..."
    # Rust build
    cargo clean 2>/dev/null && echo "  Cleaned cargo target/" || true
    # Python
    rm -rf brain/.venv brain/.pytest_cache brain/.ruff_cache
    echo "  Cleaned brain venv + caches"
    # Firefox extension
    rm -rf extension/firefox/dist extension/firefox/node_modules extension/firefox/web-ext-artifacts
    echo "  Cleaned firefox extension build artifacts"
    # Installed files
    rm -f ~/.local/bin/hippo
    rm -f "$DAEMON_PLIST" "$BRAIN_PLIST"
    NM_DIR="$HOME/Library/Application Support/Mozilla/NativeMessagingHosts"
    rm -f "$NM_DIR/hippo_daemon.json" "$NM_DIR/hippo-native-messaging"
    echo "  Removed installed plists, symlink, native messaging manifest"
    # Runtime artifacts (not data)
    rm -f "$DATA_DIR/daemon.sock" /tmp/hippo-daemon.sock
    rm -f "$DATA_DIR"/*.log
    echo "  Cleaned runtime artifacts (socket, logs)"
    echo "  Preserved: hippo.db, vectors/, fallback/, config/"
else
    echo "==> Cleaning stale artifacts..."
    rm -f "$DATA_DIR/daemon.sock" /tmp/hippo-daemon.sock
    rm -f "$DAEMON_PLIST" "$BRAIN_PLIST"
    rm -f ~/.local/bin/hippo
    rm -f "$DATA_DIR"/*.log
fi

# ── 3. Build release binary ─────────────────────────────────────────
echo "==> Building release binary..."
cargo build --release --features otel

# ── 3b. Stamp brain version ───────────────────────────────────────
echo "==> Stamping brain version..."
mise run stamp:version

# ── 4. Rebuild brain venv from scratch ──────────────────────────────
echo "==> Rebuilding brain venv..."
rm -rf brain/.venv
uv sync --project brain
echo "  venv ready at brain/.venv"

# ── 4b. Sync brain tree to XDG install location ─────────────────────
# The brain LaunchAgent runs `uv run --project ~/.local/share/hippo-brain`,
# not from the repo. Without this sync, a rebuilt daemon running against
# the installed brain sees a schema-version mismatch after any migration.
# Keep --delete so removed files don't linger, but exclude dev caches.
BRAIN_INSTALL_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/hippo-brain"
echo "==> Syncing brain to ${BRAIN_INSTALL_DIR}..."
mkdir -p "$BRAIN_INSTALL_DIR"
rsync -a --delete \
    --exclude='.venv' \
    --exclude='__pycache__' \
    --exclude='.ruff_cache' \
    --exclude='.pytest_cache' \
    brain/ "$BRAIN_INSTALL_DIR/"
# Mirror the release tarball layout: shell/ lives alongside brain/ in the repo
# but must land under $BRAIN_INSTALL_DIR/shell/ so doctor and the Claude hook find it.
rsync -a --delete shell/ "$BRAIN_INSTALL_DIR/shell/"
echo "==> Rebuilding brain venv at ${BRAIN_INSTALL_DIR}..."
(cd "$BRAIN_INSTALL_DIR" && uv sync)

# ── 5. Install plists + symlink ─────────────────────────────────────
echo "==> Installing LaunchAgents + symlink..."
cargo run --release --features otel --bin hippo -- daemon install --force

# ── 6. Bootstrap config files (preserve existing) ───────────────────
echo "==> Ensuring config files..."
mkdir -p "$CONFIG_DIR"
if [ ! -f "$CONFIG_DIR/config.toml" ]; then
    cp config/config.default.toml "$CONFIG_DIR/config.toml"
    echo "  Created $CONFIG_DIR/config.toml"
else
    echo "  $CONFIG_DIR/config.toml exists (preserved)"
fi
if [ ! -f "$CONFIG_DIR/redact.toml" ]; then
    cp config/redact.default.toml "$CONFIG_DIR/redact.toml"
    echo "  Created $CONFIG_DIR/redact.toml"
else
    echo "  $CONFIG_DIR/redact.toml exists (preserved)"
fi

# ── 7. Ensure data dir ──────────────────────────────────────────────
mkdir -p "$DATA_DIR"

# ── 7b. Refresh OTel stack when enabled or already provisioned ──────
OTEL_ENABLED=$(python3 - <<'PY'
from pathlib import Path
import os
import tomllib

config_path = Path(os.path.expanduser("~/.config/hippo/config.toml"))
if not config_path.exists():
    print("0")
else:
    config = tomllib.loads(config_path.read_text())
    print("1" if config.get("telemetry", {}).get("enabled", False) else "0")
PY
)
OTEL_STACK_PRESENT=0
if command -v docker >/dev/null 2>&1; then
    if docker ps -a 2>/dev/null | awk 'NR > 1 { print $NF }' | grep -q '^hippo-otel-'; then
        OTEL_STACK_PRESENT=1
    fi
fi
if [ "$OTEL_ENABLED" = "1" ] || [ "$OTEL_STACK_PRESENT" = "1" ]; then
    if command -v docker >/dev/null 2>&1; then
        echo "==> Refreshing OTel stack..."
        mise run otel:up || echo "  WARN: OTel stack refresh failed (non-fatal)"
    else
        echo "  WARN: Docker not found; skipped OTel stack refresh"
    fi
fi

# ── 8. Start services ───────────────────────────────────────────────
echo "==> Starting services..."
launchctl bootstrap "$DOMAIN" "$DAEMON_PLIST" && echo "  Loaded daemon" || echo "  Failed to load daemon"
launchctl bootstrap "$DOMAIN" "$BRAIN_PLIST" && echo "  Loaded brain" || echo "  Failed to load brain"

# ── 8b. Build Firefox extension dist/ ───────────────────────────────────
# manifest.json references dist/background.js and dist/content.js. These
# are required for the extension to work when loaded via about:debugging
# (the documented setup). install:ext below also builds dist/ as part of
# .xpi packaging, but it may short-circuit if Firefox Developer Edition
# isn't installed. Run the dist build unconditionally as a best-effort
# step; if it fails, install can continue but the Firefox extension may
# remain non-functional.
echo "==> Building Firefox extension dist/..."
mise run build:ext:dist || echo "  WARN: extension dist/ build failed — Firefox extension will be a no-op"

# ── 8c. Install Firefox extension (side-load into Developer Edition) ────
echo "==> Installing Firefox extension..."
mise run install:ext || echo "  WARN: extension install failed (non-fatal)"

# ── 8d. Install Claude Code skill ───────────────────────────────────────
echo "==> Installing Claude Code skill..."
mise run install:skill || echo "  WARN: skill install failed (non-fatal)"

# ── 9. Verify ────────────────────────────────────────────────────────
echo "==> Verifying..."
sleep 1
~/.local/bin/hippo doctor || true

# Wait for brain to confirm LM Studio connectivity
echo "  Checking brain health..."
for i in $(seq 1 10); do
    if health=$(curl -sf http://localhost:9175/health 2>/dev/null); then
        reachable=$(echo "$health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('lmstudio_reachable',''))" 2>/dev/null)
        if [ "$reachable" = "True" ]; then
            echo "  Brain healthy, LM Studio reachable"
            break
        fi
    fi
    if [ "$i" -eq 10 ]; then
        echo "  WARN: Brain did not confirm LM Studio connectivity within 10s"
        echo "  Check: curl http://localhost:9175/health"
        break
    fi
    sleep 1
done

echo ""
echo "=== Install complete ==="

# Check if shell needs reloading for PATH
if ! command -v hippo &>/dev/null; then
    echo ""
    echo "hippo is not on your PATH yet. Run:"
    echo "  exec zsh"
fi

# ── 10. Check OTel stack availability ───────────────────────────────
echo ""
OTEL_ENABLED=$(awk '
    BEGIN { in_telemetry = 0; enabled = "0" }
    /^[[:space:]]*\[telemetry\][[:space:]]*$/ { in_telemetry = 1; next }
    in_telemetry && /^[[:space:]]*\[/ { exit }
    in_telemetry && /^[[:space:]]*#/ { next }
    in_telemetry && /^[[:space:]]*enabled[[:space:]]*=[[:space:]]*true[[:space:]]*$/ { enabled = "1"; exit }
    in_telemetry && /^[[:space:]]*enabled[[:space:]]*=[[:space:]]*false[[:space:]]*$/ { enabled = "0"; exit }
    END { print enabled }
' "$CONFIG_DIR/config.toml" 2>/dev/null || echo "0")
OTEL_COLLECTOR_UP="0"
if curl -sf http://localhost:13133/ >/dev/null 2>&1; then
    OTEL_COLLECTOR_UP="1"
fi

if [ "$OTEL_ENABLED" = "0" ] && [ "$OTEL_COLLECTOR_UP" = "1" ]; then
    echo "NOTE: OpenTelemetry collector is running but telemetry is disabled in config."
    echo "      To enable observability:"
    echo "        1. Edit ~/.config/hippo/config.toml and set [telemetry] enabled = true"
    echo "        2. Run: mise run restart"
    echo "        3. Access Grafana: http://localhost:3000 (admin/hippo)"
elif [ "$OTEL_ENABLED" = "0" ] && [ "$OTEL_COLLECTOR_UP" = "0" ]; then
    echo "NOTE: OpenTelemetry observability is disabled."
    echo "      To enable it:"
    echo "        1. Run: mise run otel:up"
    echo "        2. Edit ~/.config/hippo/config.toml and set [telemetry] enabled = true"
    echo "        3. Run: mise run restart"
fi
'''

[tasks.start]
description = "Start hippo services via launchd"
run = """
#!/usr/bin/env bash
set -euo pipefail
DOMAIN="gui/$(id -u)"
launchctl bootstrap "$DOMAIN" ~/Library/LaunchAgents/com.hippo.daemon.plist 2>/dev/null && echo "Started daemon" || echo "Daemon already loaded (or failed)"
launchctl bootstrap "$DOMAIN" ~/Library/LaunchAgents/com.hippo.brain.plist 2>/dev/null && echo "Started brain" || echo "Brain already loaded (or failed)"
"""

[tasks.stop]
description = "Stop hippo services via launchd"
run = """
#!/usr/bin/env bash
set -euo pipefail
DOMAIN="gui/$(id -u)"
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.daemon.plist 2>/dev/null && echo "Stopped daemon" || echo "Daemon not loaded"
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.brain.plist 2>/dev/null && echo "Stopped brain" || echo "Brain not loaded"
"""

[tasks.restart]
description = "Restart hippo services"
run = "mise run stop && mise run start"

[tasks.nuke]
description = "Kill all hippo processes (SIGKILL), unload LaunchAgents, remove socket"
run = """
#!/usr/bin/env bash
set -uo pipefail

DOMAIN="gui/$(id -u)"

echo "Unloading LaunchAgents..."
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.daemon.plist 2>/dev/null && echo "  Unloaded com.hippo.daemon" || echo "  com.hippo.daemon not loaded"
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.brain.plist 2>/dev/null && echo "  Unloaded com.hippo.brain" || echo "  com.hippo.brain not loaded"

echo "Killing all hippo processes (SIGKILL)..."
pkill -9 -f 'hippo.*(daemon|send-event)' 2>/dev/null && echo "  Killed daemon processes" || echo "  No daemon processes found"
pkill -9 -f 'hippo ingest claude-session' 2>/dev/null && echo "  Killed session tailers" || echo "  No session tailers found"
pkill -9 -f 'hippo-brain' 2>/dev/null && echo "  Killed brain processes" || echo "  No brain processes found"
pkill -9 -f 'hippo-mcp' 2>/dev/null && echo "  Killed MCP servers" || echo "  No MCP servers found"

echo "Cleaning up socket..."
rm -f ~/.local/share/hippo/daemon.sock /tmp/hippo-daemon.sock

echo "Done. Data and logs preserved in ~/.local/share/hippo/"
"""

