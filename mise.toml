[tasks.nuke]
description = "Kill all hippo processes (SIGKILL), unload LaunchAgents, remove socket"
run = """
#!/usr/bin/env bash
set -uo pipefail

DOMAIN="gui/$(id -u)"

echo "Unloading LaunchAgents..."
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.omlx.plist 2>/dev/null && echo "  Unloaded com.hippo.omlx" || echo "  com.hippo.omlx not loaded"
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.daemon.plist 2>/dev/null && echo "  Unloaded com.hippo.daemon" || echo "  com.hippo.daemon not loaded"
launchctl bootout "$DOMAIN" ~/Library/LaunchAgents/com.hippo.brain.plist 2>/dev/null && echo "  Unloaded com.hippo.brain" || echo "  com.hippo.brain not loaded"

echo "Killing all hippo processes (SIGKILL)..."
pkill -9 -f '/opt/homebrew/.*/omlx serve' 2>/dev/null && echo "  Killed oMLX serve processes" || echo "  No oMLX serve processes found"
pkill -9 -f 'hippo.*(daemon|send-event)' 2>/dev/null && echo "  Killed daemon processes" || echo "  No daemon processes found"
pkill -9 -f 'hippo ingest claude-session' 2>/dev/null && echo "  Killed session tailers" || echo "  No session tailers found"
pkill -9 -f 'hippo-brain' 2>/dev/null && echo "  Killed brain processes" || echo "  No brain processes found"
pkill -9 -f 'hippo-mcp' 2>/dev/null && echo "  Killed MCP servers" || echo "  No MCP servers found"

echo "Cleaning up socket..."
rm -f ~/.local/share/hippo/daemon.sock /tmp/hippo-daemon.sock

echo "Done. Data and logs preserved in ~/.local/share/hippo/"
"""

