[project]
name = "hippo-brain"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28",
    "lancedb>=0.20",
    "pyarrow>=18.0",
    "uvicorn>=0.34",
    "starlette>=0.45",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "ruff>=0.9",
]

[project.scripts]
hippo-brain = "hippo_brain:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hippo_brain"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "live: tests requiring a running LM Studio instance",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25",
    "pytest-cov>=7.1.0",
    "ruff>=0.9",
]
