[lmstudio]
base_url = "http://localhost:1234/v1"

[models]
enrichment = "gpt-oss-120b-mlx-crack"                    # Daily: MoE, 35B total, 3B active — fast
enrichment_bulk = "gpt-oss-120b-mlx-crack"               # Bulk: strongest available — slow but reliable
query = "gpt-oss-120b-mlx-crack"                          # Same model for query reformulation
embedding = "text-embedding-nomic-embed-text-v2-moe"     # Purpose-built embedding model, 768d

[daemon]
flush_interval_ms = 100
flush_batch_size = 50
socket_timeout_ms = 100
output_head_lines = 50
output_tail_lines = 100

[brain]
port = 9175
poll_interval_secs = 5
enrichment_batch_size = 30
max_events_per_chunk = 30
max_queue_depth = 100
session_stale_secs = 120

[storage]
