[lmstudio]
base_url = "http://localhost:1234/v1"
timeout_secs = 300

[models]
enrichment = "qwen3.5-35b-a3b"     # Preferred model; hippo falls back to first available if not loaded
enrichment_bulk = "qwen3.5-35b-a3b"
query = "qwen3.5-35b-a3b"
embedding = "text-embedding-nomic-embed-text-v2-moe"     # Purpose-built embedding model, 768d

[daemon]
flush_interval_ms = 100
flush_batch_size = 50
socket_timeout_ms = 100
output_head_lines = 50
output_tail_lines = 100

[brain]
port = 9175
poll_interval_secs = 5
enrichment_batch_size = 10
max_queue_depth = 100
session_stale_secs = 120
query_timeout_secs = 300        # GUI timeout for /ask and /query requests (seconds)
# Watchdog knobs (R-22): cap how many rows a single cycle may claim per queue so
# a wedge can't strand an entire backlog, and define when a `processing` lock
# is considered stale and gets reaped back to `pending`.
max_claim_batch = 10
lock_timeout_secs = 600

[storage]
# data_dir = "~/.local/share/hippo"
# config_dir = "~/.config/hippo"

[browser]
enabled = true
min_dwell_ms = 3000                 # Skip visits shorter than this (ms)
scroll_depth_threshold = 0.15       # Skip pages scrolled < 15% with no search query
long_dwell_bypass_ms = 120000       # Keep pages with dwell >= this regardless of scroll (default: 2 min)
dedup_window_minutes = 30           # Same URL within this window = one logical visit
correlation_window_ms = 300000      # ±5min window for correlating browser + shell events
stale_session_secs = 60             # Wait this long before enriching browser sessions

[browser.allowlist]
# Only capture from these domains (subdomains included)
domains = [
    # Code forges & sharing
    "github.com",
    "github.io",
    "gitlab.com",
    # Package registries
    "crates.io",
    "npmjs.com",
    "pypi.org",
    "mvnrepository.com",
    "pkg.go.dev",
    # Language & framework docs
    "docs.rs",
    "doc.rust-lang.org",
    "docs.python.org",
    "developer.mozilla.org",
    "docs.astral.sh",
    "typescriptlang.org",
    "learn.microsoft.com",
    "kubernetes.io",
    "go.dev",
    "nodejs.org",
    # System & OS docs
    "man7.org",
    "wiki.archlinux.org",
    # Q&A & community
    "stackoverflow.com",
    "stackexchange.com",
    "reddit.com",
    "news.ycombinator.com",
    # Developer blogs & articles
    "medium.com",
    "dev.to",
]

[browser.url_redaction]
# Query parameter names to strip from URLs before storage
strip_params = [
    "token",
    "api_key",
    "password",
    "secret",
    "auth",
    "session",
    "key",
    "sig",
]

[entities]
# Absolute paths to strip as prefixes when canonicalizing path-type entities.
# Allows the same file under different worktree clones to collapse to one entity.
# Leave empty to use auto-detection (scans ~/projects/*/.git) or set
# HIPPO_PROJECT_ROOTS env var to override at runtime.
project_roots = []

[telemetry]
# OpenTelemetry observability: traces, metrics, and logs to Grafana/Tempo/Loki/Prometheus.
#
# To enable telemetry:
#   1. Start the observability stack: mise run otel:up
#   2. Set enabled = true (below)
#   3. Rebuild daemon: cargo build --release --features otel
#   4. Reinstall: mise run install
#   5. Verify: hippo doctor
#
# Access Grafana: http://localhost:3000 (admin/hippo)
# OTel Collector health: http://localhost:13133
enabled = false
endpoint = "http://localhost:4317"
