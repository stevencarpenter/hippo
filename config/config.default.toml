# OpenAI-compatible inference backend. Section was renamed from [lmstudio]
# to [inference] so the same key works for oMLX (the current default,
# port 42069), LM Studio (port 1234, the historical default), ollama
# (port 11434), vLLM, and any other backend that speaks
# /v1/chat/completions + /v1/embeddings.
[inference]
base_url = "http://127.0.0.1:42069/v1"
timeout_secs = 300

[models]
enrichment = "qwen3.6-35b-a3b-ud-mlx"     # Preferred model; hippo falls back to first available if not loaded
enrichment_bulk = "qwen3.6-35b-a3b-ud-mlx"
query = "qwen3.6-35b-a3b-ud-mlx"
embedding = "text-embedding-nomic-embed-text-v2-moe"     # Purpose-built embedding model, 768d

[daemon]
flush_interval_ms = 100
flush_batch_size = 50
socket_timeout_ms = 100
output_head_lines = 50
output_tail_lines = 100

[brain]
port = 9175
poll_interval_secs = 5
enrichment_batch_size = 10
max_queue_depth = 100
session_stale_secs = 120
query_timeout_secs = 300        # GUI timeout for /ask and /query requests (seconds)
# Watchdog knobs (R-22): cap how many rows a single cycle may claim per queue so
# a wedge can't strand an entire backlog, and define when a `processing` lock
# is considered stale and gets reaped back to `pending`.
max_claim_batch = 10
lock_timeout_secs = 600

[storage]
# data_dir = "~/.local/share/hippo"
# config_dir = "~/.config/hippo"

[browser]
enabled = true
min_dwell_ms = 3000                 # Skip visits shorter than this (ms)
scroll_depth_threshold = 0.15       # Skip pages scrolled < 15% with no search query
long_dwell_bypass_ms = 120000       # Keep pages with dwell >= this regardless of scroll (default: 120 s / 2 min)
dedup_window_minutes = 30           # Same URL within this window = one logical visit
correlation_window_ms = 300000      # ±5min window for correlating browser + shell events
stale_session_secs = 60             # Wait this long before enriching browser sessions

[browser.allowlist]
# Only capture from these domains (subdomains included)
domains = [
    # Code forges & sharing
    "github.com",
    "github.io",
    "gitlab.com",
    "bitbucket.org",
    # Package registries
    "crates.io",
    "npmjs.com",
    "pypi.org",
    "mvnrepository.com",
    "pkg.go.dev",
    "rubygems.org",
    # Language & framework docs
    "docs.rs",
    "doc.rust-lang.org",
    "rust-lang.org",
    "docs.python.org",
    "python.org",
    "swift.org",
    "developer.mozilla.org",
    "docs.astral.sh",
    "typescriptlang.org",
    "learn.microsoft.com",
    "kubernetes.io",
    "go.dev",
    "nodejs.org",
    "ziglang.org",
    # AI & ML
    "anthropic.com",
    "openai.com",
    "huggingface.co",
    "arxiv.org",
    "lmstudio.ai",
    # System & OS docs
    "man7.org",
    "wiki.archlinux.org",
    # Database & infra docs
    "sqlite.org",
    "postgresql.org",
    "redis.io",
    "docker.com",
    # Q&A & community
    "stackoverflow.com",
    "stackexchange.com",
    "reddit.com",
    "news.ycombinator.com",
    "lobste.rs",
    # Developer content
    "medium.com",
    "dev.to",
    "hackernoon.com",
    "substack.com",
]

[browser.url_redaction]
# Query parameter names to strip from URLs before storage
strip_params = [
    "token",
    "api_key",
    "password",
    "secret",
    "auth",
    "session",
    "key",
    "sig",
]

[entities]
# Absolute paths to strip as prefixes when canonicalizing path-type entities.
# Allows the same file under different worktree clones to collapse to one entity.
# Leave empty to use auto-detection (scans ~/projects/*/.git) or set
# HIPPO_PROJECT_ROOTS env var to override at runtime.
project_roots = []

[github]
# GitHub Actions CI-outcome ingest (opt-in).
#
# When enabled, a separate `com.hippo.gh-poll` LaunchAgent polls the GitHub
# REST API every 5 minutes for workflow runs on `watched_repos`, pulls jobs +
# annotations + failure log tails, and writes them to the `workflow_runs` /
# `workflow_jobs` / `workflow_annotations` tables. The brain then enriches
# them into knowledge nodes and eventually graduates recurring failures into
# `lessons` (queryable via the `get_lessons` MCP tool).
#
# To enable CI ingest:
#   1. Make sure a GitHub token is available. The launchd wrapper checks, in order:
#        a. HIPPO_GITHUB_TOKEN in the process env.
#        b. `~/.config/zsh/.env` (sourced at runtime — add `export HIPPO_GITHUB_TOKEN=ghp_...`
#           here so the env var is present under launchd; shell rc files are NOT read by
#           LaunchAgents).
#        c. `gh auth token` (zero-config — run `gh auth login` once with the GitHub CLI
#           and the wrapper picks up the OAuth token from the macOS keychain).
#      For a manual token, create one with:
#        - classic PAT: `repo` + `workflow` scopes
#        - fine-grained PAT: repository Actions (read) + Metadata (read) + Contents (read)
#   2. Set enabled = true and populate watched_repos below
#   3. Reinstall: `hippo daemon install --force` (writes the gh-poll plist)
#   4. Load the agent: `launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.hippo.gh-poll.plist`
#   5. Verify: `hippo doctor` and (after ~5 min) query via `get_ci_status` MCP tool
#
# Without these steps, CI ingest is entirely inactive — `workflow_runs` stays
# empty and CI-failure lessons never graduate. `hippo doctor` will flag this.
enabled = false
watched_repos = []             # e.g., ["stevencarpenter/hippo"]
# poll_interval_secs = 300       # Background cadence (5 min)
# tight_poll_interval_secs = 45  # Post-push cadence for watched SHAs
# watchlist_ttl_secs = 1200      # How long a pushed SHA stays in the tight-poll set (20 min)
# log_excerpt_max_bytes = 51200  # 50 KB cap per failure log tail
# token_env = "HIPPO_GITHUB_TOKEN"

[watchdog]
# Capture-reliability watchdog — enabled by default since T-2 (launchd plist ships).
#
# `hippo watchdog run` (invoked every 60 s by launchd via com.hippo.watchdog)
# reads the `source_health` table, asserts invariants I-1..I-12, and writes rows
# to `capture_alarms` for any violations.  Rate-limited to one alarm per invariant
# per `alarm_rate_limit_minutes` window (60 min during v0.17 soak; step down to
# 15 min in v0.18 after 7-day clean run — see docs/capture/architecture.md).
enabled                  = true
alarm_rate_limit_minutes = 60
notify_macos             = false
# log_path = ""                   # default: $data_dir/watchdog-alarms.log
# osascript_title = "Hippo Watchdog"

[opencode]
# Opencode coding-assistant session ingestion (live SQLite polling).
#
# When enabled, a background task polls `~/.local/share/opencode/opencode.db`
# (or the path configured below) for new/updated sessions, messages, and parts.
# It extracts session metadata (slug, model, agent, directory), tool calls,
# and snapshots, writing them into the `agentic_sessions` table. The brain then
# enriches these segments into knowledge nodes alongside claude-session data.
#
# To verify:
#   1. Ensure `~/.local/share/opencode/opencode.db` exists (open by opencode)
#   2. Set enabled = true (default)
#   3. Start daemon: mise run run:daemon or `hippo daemon start`
#   4. Verify: `hippo doctor` shows healthy `agentic-session-opencode` source

enabled = true
# poll_interval_secs = 30

[codex]
# OpenAI Codex CLI rollout-session ingestion.
#
# When enabled, `hippo codex-poll` (invoked every 60 s by the
# `com.hippo.codex-session` LaunchAgent) walks `session_roots` for
# `rollout-*.jsonl` files, parses each into task-boundary segments, and writes
# them as segmented rows in `claude_sessions` — distinguished by the `.codex/`
# path stored in the `source_file` column, with no `harness` marker. The brain
# then enriches these segments into knowledge nodes alongside Claude Code data.
#
# `session_roots` defaults to:
#   ~/.codex/sessions
#   ~/.codex/archived_sessions
#   ~/Library/Developer/Xcode/CodingAssistant/codex/sessions
# Override only if Codex stores sessions in a non-standard location.
#
# To verify:
#   1. Ensure `~/.codex/sessions` contains `rollout-*.jsonl` files
#   2. Run once: `hippo codex-poll`
#   3. Verify: `hippo doctor` shows healthy `agentic-session-codex` source

enabled = true
# min_idle_secs = 60
# poll_interval_secs = 60
# session_roots = []  # leave commented out; Rust default supplies the three paths above

[cursor]
# Cursor Agent CLI transcript ingestion.
#
# When enabled, `hippo cursor-poll` (invoked every 60 s by the
# `com.hippo.cursor-session` LaunchAgent) walks `session_roots` for
# `agent-transcripts/**/*.jsonl` files (main sessions + subagents), parses each
# into char-bounded segments, and writes them as segmented rows in
# `claude_sessions` — distinguished by the `.cursor/` path stored in the
# `source_file` column. Subagents are ingested as their own sessions with a
# parent_session_id link. The brain enriches these alongside Claude Code data.
#
# Cursor transcripts carry no per-line timestamps, so segments are bounded by
# accumulated character count and time-stamped from the file mtime.
#
# `session_roots` defaults to:
#   ~/.cursor/projects
#
# To verify:
#   1. Ensure `~/.cursor/projects` contains agent-transcripts/**/*.jsonl files
#   2. Run once: `hippo cursor-poll`
#   3. Verify: `hippo doctor` shows healthy `agentic-session-cursor` source

enabled = true
# min_idle_secs = 60
# poll_interval_secs = 60
# session_roots = []  # leave commented out; Rust default supplies ~/.cursor/projects

[telemetry]
# OpenTelemetry observability: traces, metrics, and logs to Grafana/Tempo/Loki/Prometheus.
#
# To enable telemetry:
#   1. Start the observability stack: mise run otel:up
#   2. Set enabled = true (below)
#   3. Rebuild daemon: cargo build --release --features otel
#   4. Reinstall: mise run install
#   5. Verify: hippo doctor
#
# Access Grafana: http://localhost:3030 (admin/hippo)
# OTel Collector health: http://localhost:13133
enabled = false
endpoint = "http://localhost:4317"

[reaper]
# Embedding orphan-reaper + watchdog invariant I-14.
#
# The brain runs an in-process loop that finds knowledge_nodes with no vector
# row (an anti-join, so it is source-agnostic) and re-embeds them. Watchdog
# invariant I-14 alarms when the orphan backlog grows past alarm_threshold.
interval_secs = 300       # brain reaper loop cadence
batch_size = 50           # orphans re-embedded per tick
orphan_stale_secs = 900   # min node age before it counts as an orphan
alarm_threshold = 25      # orphan count above which I-14 alarms

# ─── Obsidian vault export ────────────────────────────────────────────
# When enabled, `hippo export vault` writes a one-way markdown projection of
# the knowledge base, and a com.hippo.vault-sync LaunchAgent refreshes it on
# the poll interval. The vault is regenerated each run; edits made in it are
# discarded. Default location is <data_dir>/vault.
[vault]
enabled = false
# out = "~/.local/share/hippo/vault"
# poll_interval_secs = 300   # changing this requires `hippo daemon install --force`
# related_top_k = 8
# hub_degree_cap = 200       # entities above this are excluded from related[]
# hub_node_list_cap = 200    # max nodes listed on an entity page
# shard_by = "month"
